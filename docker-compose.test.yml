# Throwaway Postgres for integration tests. Ephemeral (tmpfs) — wiped on `down`.
#
#   docker compose -f docker-compose.test.yml up -d
#   TEST_DATABASE_URL=postgres://test:test@localhost:5544/finance_test npm --prefix backend run test:integration
#   docker compose -f docker-compose.test.yml down
services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: finance_test
    ports:
      - "5544:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d finance_test"]
      interval: 2s
      timeout: 3s
      retries: 30
